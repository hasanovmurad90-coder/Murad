<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>FlowCheck Code Editor (Cursor Clone)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg-editor: #1e1e1e;
      --bg-chat: #252526;
      --bg-input: #3c3c3c;
      --accent: #0e639c;
      --text-main: #d4d4d4;
      --text-chat: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background-color: #1e1e1e;
      color: var(--text-main);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .app-title {
      padding: 8px 16px;
      background: #2d2d30;
      color: #ffffff;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .app-title-logo {
      height: 40px;
      width: 40px;
      flex: 0 0 auto;
      border-radius: 8px;
      object-fit: contain;
    }

    .app-title-text-main {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .app-title-text-sub {
      font-size: 11px;
      opacity: 0.8;
      text-transform: uppercase;
    }

    .main-layout {
      display: flex;
      flex: 1 1 auto;
      min-height: 0;
      min-width: 0;
    }

    /* ЛЕВАЯ ПАНЕЛЬ: Редактор кода */
    .editor-panel {
      flex: 0 0 70%;
      min-width: 0;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
    }

    .code-editor {
      flex: 1 1 auto;
      width: 100%;
      border: none;
      resize: none;
      padding: 12px;
      outline: none;
      background-color: var(--bg-editor);
      color: var(--text-main);
      font-family: "Courier New", monospace;
      font-size: 14px;
      line-height: 1.4;
      tab-size: 4;
      white-space: pre;
      overflow: auto;
    }

    .code-editor::placeholder {
      color: #777;
    }

    /* ПРАВАЯ ПАНЕЛЬ: Чат */
    .chat-panel {
      flex: 0 0 30%;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-chat);
    }

    .chat-history {
      flex: 1 1 auto;
      padding: 12px;
      overflow-y: auto;
      font-size: 14px;
      color: var(--text-chat);
    }

    .chat-message {
      margin-bottom: 8px;
    }

    .chat-message b {
      color: #ffffff;
    }

    .chat-message i {
      color: #bbbbbb;
    }

    .chat-input-container {
      flex: 0 0 auto;
      padding: 8px;
      border-top: 1px solid #333;
      display: flex;
      gap: 8px;
      background-color: #1f1f1f;
    }

    .chat-input {
      flex: 1 1 auto;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #555;
      background-color: var(--bg-input);
      color: #ffffff;
      outline: none;
      font-size: 14px;
    }

    .chat-input::placeholder {
      color: #aaaaaa;
    }

    .send-button {
      flex: 0 0 auto;
      padding: 8px 14px;
      border-radius: 4px;
      border: none;
      background-color: var(--accent);
      color: #ffffff;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    .send-button:active {
      opacity: 0.8;
    }

    /* Адаптация под узкие экраны (iPhone и т.п.) */
    @media (max-width: 768px) {
      .main-layout {
        flex-direction: column;
      }
      .editor-panel {
        flex: 0 0 55%;
        border-right: none;
        border-bottom: 1px solid #333;
      }
      .chat-panel {
        flex: 0 0 45%;
      }
    }
  </style>
</head>
<body>
  <div class="app-title">
    <!-- Положите файл логотипа рядом с этим HTML и назовите его "flowcheck-logo.png" -->
    <img src="flowcheck-logo.png" alt="FlowCheck" class="app-title-logo" />
    <div>
      <div class="app-title-text-main">FlowCheck</div>
      <div class="app-title-text-sub">Контроль потоков</div>
    </div>
  </div>

  <div class="main-layout">
    <!-- ЛЕВАЯ ПАНЕЛЬ: Редактор кода -->
    <div class="editor-panel">
      <textarea
        class="code-editor"
        placeholder="Напишите ваш код здесь..."
      ></textarea>
    </div>

    <!-- ПРАВАЯ ПАНЕЛЬ: AI Chat -->
    <div class="chat-panel">
      <div id="chatHistory" class="chat-history">
        <div class="chat-message">
          <i>AI: Чем я могу помочь?</i>
        </div>
      </div>
      <div class="chat-input-container">
        <input
          id="chatInput"
          class="chat-input"
          type="text"
          placeholder="Спросите AI (Enter)..."
        />
        <button id="sendBtn" class="send-button">Спросить</button>
      </div>
    </div>
  </div>

  <script>
    const chatHistory = document.getElementById("chatHistory");
    const chatInput = document.getElementById("chatInput");
    const sendBtn = document.getElementById("sendBtn");

    function appendMessage(html) {
      const div = document.createElement("div");
      div.className = "chat-message";
      div.innerHTML = html;
      chatHistory.appendChild(div);
      chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    function sendToAI() {
      const userText = chatInput.value.trim();
      if (!userText) return;

      appendMessage("<b>Вы:</b> " + userText);
      chatInput.value = "";
      chatInput.focus();

      // Заглушка "думающего" AI
      appendMessage("<i>AI: Думаю над ответом...</i>");

      // Здесь можно подключить реальный API (OpenAI / Anthropic / Gemini / свой backend).
      // Пока — имитация ответа, как в PyQt-коде.
      setTimeout(() => {
        appendMessage(
          "<b>AI:</b> Я вижу ваш код. Хотите, чтобы я оптимизировал расчет затрат в FlowCheck?"
        );
      }, 700);
    }

    sendBtn.addEventListener("click", sendToAI);
    chatInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendToAI();
      }
    });
  </script>
</body>
</html>
